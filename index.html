<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Splitzy — friendship: priceless. The bill: not.</title>

<!-- Firebase (no install needed — loaded straight from Google's servers) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Inter:wght@400;500;600&display=swap');

  :root {
    --bg: #fff4e3;
    --panel: #ffffff;
    --ink: #2d2640;
    --muted: #9b94ad;
    --owe: #ff6b6b;
    --owed: #2bb673;
    --accent: #ffd23f;
    --accent2: #c77dff;
    --border: #2d2640;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    background-image:
      radial-gradient(circle at 10% 15%, #ffe9c2 0, transparent 35%),
      radial-gradient(circle at 90% 80%, #d9f2e6 0, transparent 35%);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .app {
    max-width: 820px;
    margin: 0 auto;
    padding: 2.5rem 1.25rem 5rem;
  }

  header {
    text-align: center;
    margin-bottom: 2rem;
  }

  h1 {
    font-family: 'Baloo 2', sans-serif;
    font-size: 3.2rem;
    margin: 0;
    color: var(--ink);
    letter-spacing: -0.02em;
    display: inline-block;
    animation: wobble 4s ease-in-out infinite;
  }

  h1 span { color: var(--owed); }

  @keyframes wobble {
    0%, 100% { transform: rotate(-2deg); }
    50% { transform: rotate(2deg); }
  }

  .subtitle {
    color: var(--muted);
    margin: 0.5rem 0 0;
    font-size: 1rem;
    font-weight: 500;
  }

  .sync-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    margin-top: 0.75rem;
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--muted);
    background: var(--panel);
    border: 2px solid var(--border);
    border-radius: 999px;
    padding: 0.3rem 0.8rem;
  }

  .sync-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--muted);
  }
  .sync-dot.live { background: var(--owed); }
  .sync-dot.error { background: var(--owe); }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.25rem;
    margin-bottom: 1.75rem;
  }

  @media (max-width: 680px) {
    .grid { grid-template-columns: 1fr; }
    h1 { font-size: 2.4rem; }
  }

  .card {
    background: var(--panel);
    border: 3px solid var(--border);
    border-radius: 20px;
    padding: 1.4rem;
    box-shadow: 6px 6px 0 var(--border);
  }

  .card h2 {
    font-family: 'Baloo 2', sans-serif;
    font-size: 1.3rem;
    margin: 0 0 0.9rem;
    font-weight: 700;
  }

  label {
    display: block;
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--muted);
    margin: 0.85rem 0 0.35rem;
  }
  label:first-of-type { margin-top: 0; }

  input, select {
    width: 100%;
    background: var(--bg);
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 0.6rem 0.7rem;
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    font-size: 0.95rem;
  }

  input:focus, select:focus {
    outline: 3px solid var(--accent);
    outline-offset: 1px;
  }

  .row { display: flex; gap: 0.5rem; }

  button {
    font-family: 'Baloo 2', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    border: 3px solid var(--border);
    border-radius: 12px;
    padding: 0.55rem 1rem;
    cursor: pointer;
    background: var(--accent);
    color: var(--ink);
    box-shadow: 3px 3px 0 var(--border);
    transition: transform 0.08s ease, box-shadow 0.08s ease;
  }

  button:hover { transform: translate(1px, 1px); box-shadow: 2px 2px 0 var(--border); }
  button:active { transform: translate(3px, 3px); box-shadow: 0 0 0 var(--border); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-primary {
    background: var(--owed);
    color: white;
    width: 100%;
    margin-top: 1.1rem;
    font-size: 1.05rem;
  }

  .avatars {
    display: flex;
    flex-wrap: wrap;
    gap: 0.6rem;
    margin-top: 1rem;
  }

  .avatar-chip {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    background: var(--bg);
    border: 2px solid var(--border);
    border-radius: 999px;
    padding: 0.3rem 0.5rem 0.3rem 0.3rem;
    font-size: 0.9rem;
    font-weight: 600;
    animation: pop 0.3s ease;
  }

  @keyframes pop {
    from { transform: scale(0.6); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .avatar-emoji {
    font-size: 1.4rem;
    line-height: 1;
    display: inline-block;
    transition: transform 0.2s ease;
  }
  .avatar-chip:hover .avatar-emoji { transform: scale(1.3) rotate(-8deg); }

  .avatar-chip button {
    background: none;
    border: none;
    box-shadow: none;
    padding: 0 0.25rem;
    font-size: 1rem;
    color: var(--muted);
  }
  .avatar-chip button:hover { color: var(--owe); transform: none; box-shadow: none; }

  .split-row {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.35rem 0;
    font-size: 0.92rem;
    cursor: pointer;
    user-select: none;
  }
  .split-row input { width: auto; }

  .empty {
    color: var(--muted);
    font-size: 0.88rem;
    font-style: italic;
  }

  .section-title {
    font-family: 'Baloo 2', sans-serif;
    font-size: 1.6rem;
    font-weight: 800;
    text-align: center;
    margin: 2.5rem 0 1.25rem;
  }

  .scoreboard {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 1rem;
  }

  .score-card {
    background: var(--panel);
    border: 3px solid var(--border);
    border-radius: 18px;
    padding: 1.1rem;
    text-align: center;
    box-shadow: 5px 5px 0 var(--border);
    position: relative;
    overflow: hidden;
  }

  .score-emoji {
    font-size: 2.4rem;
    display: block;
    animation: float 3s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }

  .score-name {
    font-family: 'Baloo 2', sans-serif;
    font-weight: 700;
    font-size: 1.1rem;
    margin: 0.4rem 0 0.1rem;
  }

  .score-amount {
    font-size: 1.4rem;
    font-weight: 800;
    margin: 0.2rem 0;
  }

  .score-amount.owed { color: var(--owed); }
  .score-amount.owes { color: var(--owe); }
  .score-amount.even { color: var(--muted); }

  .score-status {
    font-size: 0.82rem;
    color: var(--muted);
    font-weight: 500;
  }

  .showdown {
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
  }

  .showdown-line {
    background: var(--panel);
    border: 3px solid var(--border);
    border-radius: 16px;
    padding: 0.8rem 1.1rem;
    display: flex;
    align-items: center;
    gap: 0.6rem;
    font-size: 1rem;
    font-weight: 600;
    box-shadow: 4px 4px 0 var(--border);
  }

  .showdown-arrow {
    font-size: 1.3rem;
    animation: chase 1.4s ease-in-out infinite;
  }

  @keyframes chase {
    0%, 100% { transform: translateX(0); }
    50% { transform: translateX(6px); }
  }

  .showdown-amount {
    margin-left: auto;
    font-weight: 800;
    font-size: 1.1rem;
  }

  .all-settled {
    text-align: center;
    font-family: 'Baloo 2', sans-serif;
    font-size: 1.4rem;
    font-weight: 800;
    color: var(--owed);
    padding: 1.2rem;
    background: var(--panel);
    border: 3px solid var(--border);
    border-radius: 18px;
    box-shadow: 5px 5px 0 var(--border);
  }

  .float-coin {
    position: fixed;
    font-size: 2rem;
    pointer-events: none;
    animation: coinFly 1s ease-out forwards;
    z-index: 999;
  }

  @keyframes coinFly {
    0% { transform: translateY(0) scale(1) rotate(0deg); opacity: 1; }
    100% { transform: translateY(-120px) scale(1.6) rotate(360deg); opacity: 0; }
  }

  .whoami {
    margin-top: 0.75rem;
    font-size: 0.85rem;
    color: var(--muted);
  }
  .whoami select {
    width: auto;
    display: inline-block;
    font-weight: 600;
    padding: 0.3rem 0.5rem;
    border-radius: 8px;
    margin-left: 0.3rem;
  }

  .entries {
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
  }

  .entry-card {
    background: var(--panel);
    border: 3px solid var(--border);
    border-radius: 16px;
    padding: 0.8rem 1.1rem;
    display: flex;
    align-items: center;
    gap: 0.8rem;
    font-size: 0.95rem;
    box-shadow: 4px 4px 0 var(--border);
  }

  .entry-main { flex: 1; min-width: 0; }

  .entry-title {
    font-weight: 700;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .entry-meta {
    font-size: 0.8rem;
    color: var(--muted);
    margin-top: 2px;
  }

  .entry-amount {
    font-weight: 800;
    font-size: 1.05rem;
    white-space: nowrap;
  }

  .entry-delete {
    background: none;
    border: 2px solid var(--owe);
    color: var(--owe);
    box-shadow: none;
    padding: 0.3rem 0.55rem;
    font-size: 0.95rem;
    border-radius: 8px;
    flex-shrink: 0;
  }
  .entry-delete:hover { background: var(--owe); color: white; }

  .btn-paid {
    background: var(--owed);
    color: white;
    border-color: var(--border);
    box-shadow: 3px 3px 0 var(--border);
    font-size: 0.85rem;
    padding: 0.4rem 0.75rem;
    flex-shrink: 0;
    white-space: nowrap;
  }

  .showdown-line.is-paid {
    opacity: 0.45;
    text-decoration: line-through;
    box-shadow: none;
  }

  .paid-history {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    margin-top: 1rem;
  }

  .paid-entry {
    background: #edfaf3;
    border: 2px dashed #2bb673;
    border-radius: 14px;
    padding: 0.65rem 1rem;
    font-size: 0.9rem;
    color: var(--owed);
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .paid-entry .paid-date {
    margin-left: auto;
    font-size: 0.75rem;
    color: var(--muted);
    font-weight: 400;
  }

  .btn-undo {
    background: #fff3cd;
    color: var(--ink);
    border: 2px solid var(--border);
    box-shadow: 2px 2px 0 var(--border);
    font-size: 0.8rem;
    padding: 0.25rem 0.6rem;
    border-radius: 8px;
    flex-shrink: 0;
    margin-left: 0.5rem;
    white-space: nowrap;
  }
  .btn-undo:hover { background: var(--owe); color: white; }

  /* Big celebration overlay */
  .celebrate-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    animation: fadeIn 0.2s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .celebrate-box {
    background: var(--panel);
    border: 4px solid var(--border);
    border-radius: 24px;
    box-shadow: 8px 8px 0 var(--border);
    padding: 2.5rem 2rem;
    text-align: center;
    max-width: 340px;
    animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }

  @keyframes popIn {
    from { transform: scale(0.5); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .celebrate-emoji {
    font-size: 4rem;
    display: block;
    margin-bottom: 0.5rem;
    animation: spin 0.6s ease;
  }

  @keyframes spin {
    from { transform: rotate(-20deg) scale(0.5); }
    to { transform: rotate(0deg) scale(1); }
  }

  .celebrate-title {
    font-family: 'Baloo 2', sans-serif;
    font-size: 1.6rem;
    font-weight: 800;
    margin: 0 0 0.4rem;
  }

  .celebrate-sub {
    color: var(--muted);
    font-size: 0.95rem;
    margin-bottom: 1.2rem;
  }

  .celebrate-close {
    background: var(--accent);
    width: 100%;
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>Split<span>zy</span> 🎉</h1>
    <p class="subtitle">Friendship: priceless. The bill: itemized below.</p>
    <div class="sync-badge"><span class="sync-dot" id="sync-dot"></span><span id="sync-text">Connecting...</span></div>
    <div class="whoami">Who are you? <select id="whoami-select"><option value="">Select yourself</option></select></div>
  </header>

  <div class="grid">
    <div class="card">
      <h2>👯 The Crew</h2>
      <form id="person-form">
        <div class="row">
          <input id="person-name" placeholder="Add a friend..." autocomplete="off">
          <button type="submit">Add</button>
        </div>
      </form>
      <div id="people-list" class="avatars"></div>
    </div>

    <div class="card">
      <h2>🧾 Log a Spend</h2>
      <form id="expense-form">
        <label for="expense-title">What happened?</label>
        <input id="expense-title" placeholder="e.g. Surprise birthday cake" autocomplete="off">

        <label for="expense-amount">How much pain (₹)?</label>
        <input id="expense-amount" type="number" min="0" step="0.01" placeholder="0.00">

        <label for="expense-paidby">Who fronted the cash?</label>
        <select id="expense-paidby"></select>

        <label>Who's in on this?</label>
        <div id="expense-split"></div>

        <button type="submit" class="btn-primary" id="add-expense-btn">💸 Add to the chaos</button>
      </form>
    </div>
  </div>

  <div class="section-title">📜 The Receipts</div>
  <div id="entries" class="entries"></div>

  <div class="section-title">🏆 The Scoreboard</div>
  <div id="scoreboard" class="scoreboard"></div>

  <div class="section-title">⚔️ The Showdown (simplified)</div>
  <div id="showdown"></div>

  <div class="section-title">🏅 Hall of Honour</div>
  <div id="paid-history" class="paid-history"></div>
</div>

<script>
  // =====================================================================
  // STEP 1: PASTE YOUR FIREBASE CONFIG HERE
  // Get this from: Firebase Console -> Project Settings -> Your apps -> Web app
  // =====================================================================
  const firebaseConfig = {
    apiKey: "AIzaSyD5BY5kLNTNkfkvDa1b3u47bDY1e12HlIY",
    authDomain: "splitzy-ashutosh.firebaseapp.com",
    projectId: "splitzy-ashutosh",
    storageBucket: "splitzy-ashutosh.firebasestorage.app",
    messagingSenderId: "814292059470",
    appId: "1:814292059470:web:11d3e82b8d757045c80a1f"
  };
  // =====================================================================

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  // Everyone reads and writes this ONE shared document
  const tabRef = db.collection('splitzy').doc('shared-tab');

  // ---- Data (now lives in Firestore, not the browser) ----
  let people = [];
  let expenses = [];
  let paidSettlements = []; // { from, to, amount, paidAt }
  const AVATAR_POOL = ['🦄','🐸','🦖','🐙','🦊','🐻','🐯','🦁','🐰','🐼','🐨','🦝','🐵','🦒','🐢','🐳','🦔','🐔'];

  function uid() {
    return Math.random().toString(36).slice(2, 10);
  }

  function nameFor(id) {
    const p = people.find(p => p.id === id);
    return p ? p.name : 'Unknown';
  }

  function emojiFor(id) {
    const p = people.find(p => p.id === id);
    return p ? p.emoji : '👤';
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  // ---- Who am I? (so people can only delete their own entries) ----
  let currentUser = localStorage.getItem('splitzy_whoami') || '';

  document.getElementById('whoami-select').addEventListener('change', (e) => {
    currentUser = e.target.value;
    localStorage.setItem('splitzy_whoami', currentUser);
    render();
  });

  function renderWhoAmI() {
    const select = document.getElementById('whoami-select');
    if (currentUser && !people.find(p => p.id === currentUser)) {
      currentUser = '';
      localStorage.removeItem('splitzy_whoami');
    }
    select.innerHTML = '<option value="">Select yourself</option>' + people.map(p =>
      `<option value="${p.id}" ${p.id === currentUser ? 'selected' : ''}>${p.emoji} ${escapeHtml(p.name)}</option>`
    ).join('');
  }

  // ---- Entries (full history, with delete-your-own) ----
  function renderEntries() {
    const el = document.getElementById('entries');
    if (expenses.length === 0) {
      el.innerHTML = '<p class="empty" style="text-align:center;">No spends logged yet.</p>';
      return;
    }
    el.innerHTML = expenses.map(e => {
      const canDelete = currentUser && e.paidBy === currentUser;
      return `
        <div class="entry-card">
          <div class="entry-main">
            <div class="entry-title">${emojiFor(e.paidBy)} ${escapeHtml(e.title)}</div>
            <div class="entry-meta">paid by ${escapeHtml(nameFor(e.paidBy))} · split between ${e.splitAmong.map(id => emojiFor(id)).join(' ')}</div>
          </div>
          <div class="entry-amount">₹${e.amount.toFixed(2)}</div>
          ${canDelete ? `<button class="entry-delete" data-delete-entry="${e.id}" title="Delete this entry">🗑️</button>` : ''}
        </div>
      `;
    }).join('');

    el.querySelectorAll('[data-delete-entry]').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = btn.getAttribute('data-delete-entry');
        expenses = expenses.filter(e => e.id !== id);
        saveToFirestore();
      });
    });
  }

  // ---- Balance math ----
  function computeBalances() {
    const balance = {};
    people.forEach(p => balance[p.id] = 0);

    expenses.forEach(e => {
      if (e.splitAmong.length === 0) return;
      const share = e.amount / e.splitAmong.length;
      balance[e.paidBy] = (balance[e.paidBy] || 0) + e.amount;
      e.splitAmong.forEach(id => {
        balance[id] = (balance[id] || 0) - share;
      });
    });
    return balance;
  }

  function computeSettlements() {
    const balance = { ...computeBalances() };
    const debtors = Object.entries(balance)
      .filter(([, v]) => v < -0.01)
      .sort((a, b) => a[1] - b[1]);
    const creditors = Object.entries(balance)
      .filter(([, v]) => v > 0.01)
      .sort((a, b) => b[1] - a[1]);

    const result = [];
    let i = 0, j = 0;
    while (i < debtors.length && j < creditors.length) {
      const amount = Math.min(-debtors[i][1], creditors[j][1]);
      result.push({ from: debtors[i][0], to: creditors[j][0], amount });
      debtors[i][1] += amount;
      creditors[j][1] -= amount;
      if (Math.abs(debtors[i][1]) < 0.01) i++;
      if (Math.abs(creditors[j][1]) < 0.01) j++;
    }
    return result;
  }

  // ---- Fun copy ----
  function statusFor(balance) {
    if (Math.abs(balance) < 1) {
      const lines = [
        'Cleaner than your browsing history 🕵️',
        'Not a paisa owed. Suspicious. 🤨',
        'Free as a bird. Broke as one too. 🐦',
        'Zero debts. Zero friends? Nah, you\'re good. ✌️',
        'Settled up. Mummy would be proud. 🥹',
      ];
      return { text: lines[Math.floor(Math.random() * lines.length)], cls: 'even' };
    }
    if (balance > 0) {
      if (balance < 200) return { text: 'Owed pocket change 🪙', cls: 'owed' };
      if (balance < 1000) return { text: 'Quietly building an empire 👑', cls: 'owed' };
      if (balance < 5000) return { text: 'Basically a loan shark now 🦈', cls: 'owed' };
      return { text: 'At this point, charge interest 💰', cls: 'owed' };
    } else {
      const abs = -balance;
      if (abs < 200) return { text: 'Owes them a chai ☕', cls: 'owes' };
      if (abs < 1000) return { text: 'Sweating a little 😅', cls: 'owes' };
      if (abs < 5000) return { text: 'Time to sell a kidney 🫘', cls: 'owes' };
      return { text: 'Ghost them and move cities 🏃', cls: 'owes' };
    }
  }

  // ---- Celebration overlay ----
  const CELEBRATIONS = [
    { emoji: '🤑', title: 'Money transferred!', sub: 'Friendship: restored. Bank account: cried a little.' },
    { emoji: '🫡', title: 'Salute!', sub: 'Debt cleared. You may now look them in the eye again.' },
    { emoji: '🕊️', title: 'Peace at last.', sub: 'No more awkward "sooo about that money..." texts.' },
    { emoji: '👑', title: 'Royally settled!', sub: 'The accountants are weeping tears of joy.' },
    { emoji: '🎯', title: 'Bullseye!', sub: 'Precise. Clean. Suspiciously adult of you.' },
    { emoji: '🧾', title: 'Receipt stamped!', sub: 'The debt gods are appeased. You may rest.' },
    { emoji: '🥂', title: 'Cheers to that!', sub: 'Paid up. Buy yourself something nice. (You can\'t afford it.)' },
  ];

  function showCelebration(fromName, toName, amount) {
    const c = CELEBRATIONS[Math.floor(Math.random() * CELEBRATIONS.length)];
    const overlay = document.createElement('div');
    overlay.className = 'celebrate-overlay';
    overlay.innerHTML = `
      <div class="celebrate-box">
        <span class="celebrate-emoji">${c.emoji}</span>
        <div class="celebrate-title">${c.title}</div>
        <div class="celebrate-sub">${c.sub}<br><br><strong>${fromName}</strong> paid <strong>${toName}</strong> ₹${amount.toFixed(2)}</div>
        <button class="celebrate-close" onclick="this.closest('.celebrate-overlay').remove()">Nice one 🤙</button>
      </div>
    `;
    document.body.appendChild(overlay);
    overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });

    if (typeof confetti === 'function') {
      confetti({ particleCount: 120, spread: 80, origin: { y: 0.5 }, colors: ['#ffd23f','#2bb673','#c77dff','#ff6b6b'] });
    }
  }

  // ---- Paid history ----
  function renderPaidHistory() {
    const el = document.getElementById('paid-history');
    if (paidSettlements.length === 0) {
      el.innerHTML = '<p class="empty" style="text-align:center;">Nobody\'s paid up yet. Shocking. 😒</p>';
      return;
    }
    el.innerHTML = [...paidSettlements].reverse().map((s, reversedIdx) => {
      const realIdx = paidSettlements.length - 1 - reversedIdx;
      const date = new Date(s.paidAt);
      const dateStr = date.toLocaleDateString('en-IN', { day: 'numeric', month: 'short' });
      const canUndo = currentUser === s.to;
      return `
        <div class="paid-entry">
          ✅ \${escapeHtml(nameFor(s.from))} paid \${escapeHtml(nameFor(s.to))} ₹\${s.amount.toFixed(2)}
          <span class="paid-date">\${dateStr}</span>
          \${canUndo ? `<button class="btn-undo" data-undo-idx="\${realIdx}">↩️ Undo</button>` : ''}
        </div>
      `;
    }).join('');

    el.querySelectorAll('[data-undo-idx]').forEach(btn => {
      btn.addEventListener('click', () => {
        const idx = parseInt(btn.getAttribute('data-undo-idx'));
        const s = paidSettlements[idx];
        if (!s) return;
        const confirmed = confirm(\`Undo payment of ₹\${s.amount.toFixed(2)} from \${nameFor(s.from)} to \${nameFor(s.to)}?\n\nOnly do this if it was marked paid by mistake.\`);
        if (!confirmed) return;
        // Restore the debt as a new expense so balances go back to what they were
        expenses.push({
          id: uid(),
          title: '↩️ Undone payment: ' + nameFor(s.from) + ' → ' + nameFor(s.to),
          amount: s.amount,
          paidBy: s.to,
          splitAmong: [s.from, s.to],
        });
        paidSettlements.splice(idx, 1);
        saveToFirestore();
      });
    });
  }

  // ---- Rendering ----
  function render() {
    renderWhoAmI();
    renderPeople();
    renderPaidBySelect();
    renderSplitCheckboxes();
    renderEntries();
    renderScoreboard();
    renderShowdown();
    renderPaidHistory();
  }

  function renderPeople() {
    const list = document.getElementById('people-list');
    if (people.length === 0) {
      list.innerHTML = '<p class="empty">No one here yet — add yourself first!</p>';
      return;
    }
    list.innerHTML = people.map(p => `
      <div class="avatar-chip">
        <span class="avatar-emoji">${p.emoji}</span>
        <span>${escapeHtml(p.name)}</span>
        <button data-remove-person="${p.id}" title="Remove" aria-label="Remove ${escapeHtml(p.name)}">&times;</button>
      </div>
    `).join('');

    list.querySelectorAll('[data-remove-person]').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = btn.getAttribute('data-remove-person');
        people = people.filter(p => p.id !== id);
        expenses = expenses.filter(e => e.paidBy !== id && !e.splitAmong.includes(id));
        saveToFirestore();
      });
    });
  }

  function renderPaidBySelect() {
    const select = document.getElementById('expense-paidby');
    if (people.length === 0) {
      select.innerHTML = '<option value="">Add people first</option>';
      select.disabled = true;
      return;
    }
    select.disabled = false;
    select.innerHTML = people.map(p => `<option value="${p.id}">${p.emoji} ${escapeHtml(p.name)}</option>`).join('');
  }

  function renderSplitCheckboxes() {
    const container = document.getElementById('expense-split');
    if (people.length === 0) {
      container.innerHTML = '<p class="empty">Add people to pick who\'s splitting this.</p>';
      return;
    }
    container.innerHTML = people.map(p => `
      <label class="split-row">
        <input type="checkbox" value="${p.id}" checked>
        <span>${p.emoji} ${escapeHtml(p.name)}</span>
      </label>
    `).join('');
  }

  function renderScoreboard() {
    const board = document.getElementById('scoreboard');
    if (people.length === 0) {
      board.innerHTML = '<p class="empty">Add some friends to start the scoreboard.</p>';
      return;
    }
    const balances = computeBalances();
    board.innerHTML = people.map(p => {
      const bal = balances[p.id] || 0;
      const status = statusFor(bal);
      const sign = bal > 0 ? '+' : (bal < 0 ? '-' : '');
      return `
        <div class="score-card">
          <span class="score-emoji">${p.emoji}</span>
          <div class="score-name">${escapeHtml(p.name)}</div>
          <div class="score-amount ${status.cls}">${sign}₹${Math.abs(bal).toFixed(2)}</div>
          <div class="score-status">${status.text}</div>
        </div>
      `;
    }).join('');
  }

  function renderShowdown() {
    const el = document.getElementById('showdown');
    if (people.length === 0) {
      el.innerHTML = '<p class="empty" style="text-align:center;">No crew, no drama. Add some friends!</p>';
      return;
    }
    if (expenses.length === 0) {
      el.innerHTML = '<p class="empty" style="text-align:center;">No spends logged. Peace... for now.</p>';
      return;
    }
    const settlements = computeSettlements();
    if (settlements.length === 0) {
      el.innerHTML = '<div class="all-settled">🎊 Everyone is square! Suspiciously wholesome.</div>';
      maybeConfetti();
      return;
    }
    el.innerHTML = '<div class="showdown">' + settlements.map(s => {
      const canPay = currentUser === s.from;
      return `
        <div class="showdown-line" data-from="${s.from}" data-to="${s.to}" data-amount="${s.amount}">
          <span>${emojiFor(s.from)} ${escapeHtml(nameFor(s.from))}</span>
          <span class="showdown-arrow">💸➡️</span>
          <span>${emojiFor(s.to)} ${escapeHtml(nameFor(s.to))}</span>
          <span class="showdown-amount">₹${s.amount.toFixed(2)}</span>
          ${canPay ? `<button class="btn-paid" data-pay-from="${s.from}" data-pay-to="${s.to}" data-pay-amount="${s.amount}">Mark Paid ✅</button>` : ''}
        </div>
      `;
    }).join('') + '</div>';

    el.querySelectorAll('[data-pay-from]').forEach(btn => {
      btn.addEventListener('click', () => {
        const from = btn.getAttribute('data-pay-from');
        const to = btn.getAttribute('data-pay-to');
        const amount = parseFloat(btn.getAttribute('data-pay-amount'));

        // Record payment and clear matching expenses
        paidSettlements.push({ from, to, amount, paidAt: Date.now() });

        // Remove expenses that this payment covers (payer was `from`, split included `to`, or vice versa)
        // Strategy: remove all expenses where `from` owes `to` until the balance is cleared
        expenses = expenses.filter(e => {
          const involvesBoth = (e.paidBy === to && e.splitAmong.includes(from)) ||
                               (e.paidBy === from && e.splitAmong.includes(to));
          return !involvesBoth;
        });

        showCelebration(nameFor(from), nameFor(to), amount);
        saveToFirestore();
      });
    });
  }

  let lastConfettiKey = null;
  function maybeConfetti() {
    const key = JSON.stringify({ p: people.length, e: expenses.length });
    if (key === lastConfettiKey) return;
    lastConfettiKey = key;
    if (typeof confetti === 'function') {
      confetti({ particleCount: 80, spread: 70, origin: { y: 0.6 } });
    }
  }

  function floatCoin(x, y) {
    const coin = document.createElement('div');
    coin.className = 'float-coin';
    coin.textContent = '🪙';
    coin.style.left = x + 'px';
    coin.style.top = y + 'px';
    document.body.appendChild(coin);
    setTimeout(() => coin.remove(), 1000);
  }

  // ---- Firestore sync ----
  function setSyncStatus(state, text) {
    document.getElementById('sync-dot').className = 'sync-dot ' + state;
    document.getElementById('sync-text').textContent = text;
  }

  function saveToFirestore() {
    tabRef.set({ people, expenses, paidSettlements }).catch(err => {
      setSyncStatus('error', 'Sync failed — check your Firebase setup');
      console.error(err);
    });
  }

  // Listens for changes from EVERYONE — this is what makes it "shared"
  tabRef.onSnapshot((doc) => {
    if (doc.exists) {
      const data = doc.data();
      people = data.people || [];
      expenses = data.expenses || [];
      paidSettlements = data.paidSettlements || [];
    } else {
      people = [];
      expenses = [];
      paidSettlements = [];
      tabRef.set({ people, expenses, paidSettlements });
    }
    setSyncStatus('live', 'Live — synced with your crew');
    render();
  }, (err) => {
    setSyncStatus('error', 'Could not connect — check your Firebase config');
    console.error(err);
  });

  // ---- Form handlers ----
  document.getElementById('person-form').addEventListener('submit', (e) => {
    e.preventDefault();
    const input = document.getElementById('person-name');
    const name = input.value.trim();
    if (!name) return;
    const usedEmojis = people.map(p => p.emoji);
    const available = AVATAR_POOL.filter(em => !usedEmojis.includes(em));
    const emoji = (available.length > 0 ? available : AVATAR_POOL)[Math.floor(Math.random() * (available.length > 0 ? available.length : AVATAR_POOL.length))];
    people.push({ id: uid(), name, emoji });
    input.value = '';
    saveToFirestore();
  });

  document.getElementById('expense-form').addEventListener('submit', (e) => {
    e.preventDefault();
    const title = document.getElementById('expense-title').value.trim();
    const amount = parseFloat(document.getElementById('expense-amount').value);
    const paidBy = document.getElementById('expense-paidby').value;
    const splitAmong = Array.from(document.querySelectorAll('#expense-split input:checked')).map(c => c.value);

    if (!title || isNaN(amount) || amount <= 0 || !paidBy || splitAmong.length === 0) return;

    expenses.push({ id: uid(), title, amount, paidBy, splitAmong });

    const btn = document.getElementById('add-expense-btn');
    const rect = btn.getBoundingClientRect();
    floatCoin(rect.left + rect.width / 2, rect.top);

    document.getElementById('expense-title').value = '';
    document.getElementById('expense-amount').value = '';
    saveToFirestore();
  });
</script>
</body>
</html>
